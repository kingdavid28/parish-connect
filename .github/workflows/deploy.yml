name: Deploy to Hostinger

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Frontend
        run: npm run build

      - name: Deploy via SSH (rsync)
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete --exclude='.env' --exclude='.env.example' --exclude='uploads/' --exclude='node_modules/'
          path: dist/
          remote_path: /home/u222318185/public_html/parish-connect/
          remote_host: 82.29.188.70
          remote_port: 65002
          remote_user: u222318185
          remote_key: ${{ secrets.HOSTINGER_SSH_KEY }}

      - name: Deploy API via SSH (rsync)
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --exclude='.env' --exclude='.env.example' --exclude='uploads/' --exclude='vendor/'
          path: api/
          remote_path: /home/u222318185/public_html/parish-connect/api/
          remote_host: 82.29.188.70
          remote_port: 65002
          remote_user: u222318185
          remote_key: ${{ secrets.HOSTINGER_SSH_KEY }}
